version: '3.8'
services:
  auth:
    container_name: auth
    build:
      context: ./
      dockerfile: Dockerfile.auth
    restart: always
    depends_on:
      postgresql:
        condition: service_started
      redis:
        condition: service_started
    # healthcheck:
    #   test: ["executable", "arg"]
    #   interval: 1m30s
    #   timeout: 30s
    #   retries: 5
    #   start_period: 30s
    ports:
      - "8001:8001"
    networks:
      - web

  postgresql:
    container_name: postgresql
    image: postgres:latest
    env_file: 
      - ./databases/postgresql/db.env
    volumes:
      - ./databases/postgresql/init:/docker-entrypoint-initdb.d
      - ./databases/postgresql/data:/var/lib/postgresql/data
    restart: always
    # healthcheck:
    #   test: ["executable", "arg"]
    #   interval: 1m30s
    #   timeout: 30s
    #   retries: 5
    #   start_period: 30s
    ports:
      - 5432:5432

  redis:
    container_name: redis
    image: redis:latest
    volumes:
      - ./databases/redis/data:/redis/data
    restart: always
        # healthcheck:
    #   test: ["executable", "arg"]
    #   interval: 1m30s
    #   timeout: 30s
    #   retries: 5
    #   start_period: 30s
    ports:
      - 6379:6379

networks:
  web:
    driver: bridge

